<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelFlow Recommender Dashboard</title>
    <!--
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║                    📊 NOVELFLOW DASHBOARD - PREMIUM EDITION 📊              ║
    ╠══════════════════════════════════════════════════════════════════════════════╣
    ║                                                                              ║
    ║  HOW TO UPDATE DATA:                                                        ║
    ║                                                                              ║
    ║  1. Find the "📋 EMBEDDED DATA" section below (around line 1050)           ║
    ║  2. Update the `const DATA = { ... }` object with your metrics              ║
    ║  3. Save the file - no server required! Open directly in browser!           ║
    ║                                                                              ║
    ║  DATA STRUCTURE:                                                             ║
    ║                                                                              ║
    ║  {                                                                          ║
    ║    "last_updated": "2026-05-05 12:00",  ← Update this timestamp            ║
    ║    "users": {                                                               ║
    ║      "Username": {                  ← Username (supports ♡, /, spaces)     ║
    ║        "link_visits": 0,            ← Total clicks on referral links       ║
    ║        "unique_visitors": 0,         ← Distinct users who visited           ║
    ║        "new_users": 0,              ← New signups from referrals           ║
    ║        "subscription_revenue": 0.00,← Revenue from subscriptions ($)      ║
    ║        "ad_revenue": 0.00            ← Revenue from advertisements ($)      ║
    ║      }                                                                      ║
    ║    }                                                                        ║
    ║  }                                                                          ║
    ║                                                                              ║
    ║  THEME: Click the 🌙/☀️ button to toggle dark/light mode                     ║
    ║                                                                              ║
    ╚══════════════════════════════════════════════════════════════════════════════╝
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           CSS Variables & Theme System
           ======================================== */
        :root {
            /* Dark Theme (Default) */
            --bg-primary: #050714;
            --bg-secondary: #0d1230;
            --bg-card: rgba(20, 28, 68, 0.7);
            --bg-card-hover: rgba(30, 40, 90, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-border: rgba(255, 255, 255, 0.08);
            
            /* Accent Colors */
            --accent-primary: #e94560;
            --accent-secondary: #f97316;
            --accent-gradient: linear-gradient(135deg, #e94560 0%, #f97316 50%, #fbbf24 100%);
            --accent-glow: rgba(233, 69, 96, 0.4);
            
            /* Metric Colors */
            --metric-link: #22d3ee;
            --metric-visitors: #a78bfa;
            --metric-users: #34d399;
            --metric-subscription: #fbbf24;
            --metric-ad: #f472b6;
            
            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --text-inverse: #0f172a;
            
            /* Borders & Effects */
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(233, 69, 96, 0.3);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(233, 69, 96, 0.15);
            
            /* Medal Colors */
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --silver: #c0c0c0;
            --silver-glow: rgba(192, 192, 192, 0.3);
            --bronze: #cd7f32;
            --bronze-glow: rgba(205, 127, 50, 0.35);
            
            /* Animation */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.3s;
            --duration-slow: 0.5s;
            
            /* Spacing */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }
        
        /* Light Theme */
        [data-theme="light"] {
            --bg-primary: #f0f4ff;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-glass-border: rgba(0, 0, 0, 0.08);
            
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --text-inverse: #ffffff;
            
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-glow: rgba(233, 69, 96, 0.4);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 40px rgba(233, 69, 96, 0.2);
        }

        /* ========================================
           Reset & Base Styles
           ======================================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background var(--duration-slow) var(--ease-smooth),
                        color var(--duration-slow) var(--ease-smooth);
        }
        
        /* ========================================
           Loading Screen
           ======================================== */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s var(--ease-smooth), visibility 0.6s;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            animation: logoReveal 0.8s var(--ease-out-expo) 0.2s forwards;
        }
        
        .loading-text {
            margin-top: 24px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeSlideUp 0.6s var(--ease-smooth) 0.6s forwards;
        }
        
        .loading-bar {
            width: 200px;
            height: 3px;
            background: var(--border-subtle);
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
            opacity: 0;
            animation: fadeSlideUp 0.6s var(--ease-smooth) 0.8s forwards;
        }
        
        .loading-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
            animation: loadingProgress 1.5s var(--ease-out-expo) 1s forwards;
            width: 0%;
        }
        
        @keyframes logoReveal {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                transform: translateY(10px);
            }
        }
        
        @keyframes loadingProgress {
            to { width: 100%; }
        }

        /* ========================================
           Particle Background
           ======================================== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ========================================
           Background Effects
           ======================================== */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(150px);
            will-change: transform, opacity;
        }

        .bg-glow-1 {
            top: -300px;
            right: -200px;
            width: 700px;
            height: 700px;
            background: var(--accent-primary);
            opacity: 0.12;
            animation: floatGlow1 20s ease-in-out infinite;
        }

        .bg-glow-2 {
            bottom: -300px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: var(--accent-secondary);
            opacity: 0.1;
            animation: floatGlow2 25s ease-in-out infinite;
        }

        .bg-glow-3 {
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            opacity: 0.06;
            animation: pulseGlow 15s ease-in-out infinite;
        }

        @keyframes floatGlow1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 40px) scale(1.05); }
            66% { transform: translate(20px, -20px) scale(0.95); }
        }

        @keyframes floatGlow2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -30px) scale(1.1); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.06; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* ========================================
           Main Container
           ======================================== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* ========================================
           Navigation
           ======================================== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            margin-bottom: 48px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px var(--accent-glow);
            transition: transform var(--duration-normal) var(--ease-bounce),
                        box-shadow var(--duration-normal) var(--ease-smooth);
        }
        
        .logo:hover .logo-icon {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 12px 32px var(--accent-glow);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-subtitle {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
            backdrop-filter: blur(12px);
        }
        
        .nav-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }
        
        .nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .lang-switch {
            display: flex;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            padding: 4px;
            border: 1px solid var(--bg-glass-border);
            backdrop-filter: blur(12px);
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--duration-normal) var(--ease-smooth);
            font-family: inherit;
        }

        .lang-btn.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .lang-btn:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all var(--duration-normal) var(--ease-smooth);
            backdrop-filter: blur(12px);
        }

        .nav-link:hover {
            background: var(--bg-card);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow-glow);
        }

        /* ========================================
           Page Header
           ======================================== */
        .page-header {
            text-align: center;
            margin-bottom: 56px;
            position: relative;
        }
        
        .page-header::before {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            filter: blur(200px);
            opacity: 0.1;
            pointer-events: none;
        }

        .user-welcome {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .user-name {
            font-size: 52px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 0 0 60px var(--accent-glow);
        }

        .last-updated {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--bg-glass);
            border-radius: var(--radius-lg);
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--bg-glass-border);
            backdrop-filter: blur(12px);
        }

        .last-updated svg {
            color: var(--accent-secondary);
            width: 16px;
            height: 16px;
        }

        /* ========================================
           Stats Grid
           ======================================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--bg-glass-border);
            transition: all var(--duration-normal) var(--ease-smooth);
            box-shadow: var(--shadow-soft);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity var(--duration-normal) var(--ease-smooth);
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-glow), var(--shadow-soft);
            border-color: var(--border-glow);
        }
        
        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .stat-icon svg {
            width: 24px;
            height: 24px;
        }
        
        .stat-card:nth-child(1) .stat-icon { 
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(34, 211, 238, 0.05)); 
            color: var(--metric-link);
            box-shadow: 0 4px 16px rgba(34, 211, 238, 0.3);
        }
        .stat-card:nth-child(2) .stat-icon { 
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(167, 139, 250, 0.05)); 
            color: var(--metric-visitors);
            box-shadow: 0 4px 16px rgba(167, 139, 250, 0.3);
        }
        .stat-card:nth-child(3) .stat-icon { 
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(52, 211, 153, 0.05)); 
            color: var(--metric-users);
            box-shadow: 0 4px 16px rgba(52, 211, 153, 0.3);
        }
        .stat-card:nth-child(4) .stat-icon { 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(251, 191, 36, 0.05)); 
            color: var(--metric-subscription);
            box-shadow: 0 4px 16px rgba(251, 191, 36, 0.3);
        }
        .stat-card:nth-child(5) .stat-icon { 
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.2), rgba(244, 114, 182, 0.05)); 
            color: var(--metric-ad);
            box-shadow: 0 4px 16px rgba(244, 114, 182, 0.3);
        }

        .sparkline-container {
            width: 60px;
            height: 30px;
        }

        .sparkline-container canvas {
            width: 100%;
            height: 100%;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 1;
        }
        
        .stat-value .prefix,
        .stat-value .suffix {
            font-size: 20px;
            font-weight: 600;
            opacity: 0.7;
        }

        .stat-desc {
            font-size: 12px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }
        
        /* Trend indicator */
        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            background: rgba(52, 211, 153, 0.1);
            color: var(--metric-users);
        }
        
        .stat-trend.up { color: var(--metric-users); }
        .stat-trend.down { color: var(--accent-primary); }

        /* ========================================
           Rank Card
           ======================================== */
        .rank-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 48px;
            margin-bottom: 48px;
            border: 1px solid var(--bg-glass-border);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }
        
        .rank-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.08) 0%, rgba(249, 115, 22, 0.08) 100%);
            pointer-events: none;
        }
        
        .rank-section::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.05) 0%, transparent 50%);
            animation: rotateBg 30s linear infinite;
        }
        
        @keyframes rotateBg {
            to { transform: rotate(360deg); }
        }

        .rank-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .rank-number {
            font-size: 96px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            line-height: 1;
            text-shadow: 0 0 80px var(--accent-glow);
            position: relative;
            z-index: 1;
        }
        
        .rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-glass);
            border-radius: 50px;
            margin-bottom: 16px;
            border: 1px solid var(--bg-glass-border);
            position: relative;
            z-index: 1;
        }
        
        .rank-badge svg {
            width: 18px;
            height: 18px;
            color: var(--gold);
        }
        
        .rank-badge span {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .rank-gap {
            font-size: 18px;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        .rank-gap strong {
            color: var(--accent-secondary);
            font-weight: 700;
        }
        
        /* Share button */
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 600;

            height: 14px;
            opacity: 0.5;

        .table-body {
            max-height: 700px;
            overflow-y: auto;

        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 110px 110px 110px 130px 130px 160px 100px;

            transition: all var(--duration-normal) var(--ease-smooth);
            position: relative;

        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: transparent;
            transition: background var(--duration-normal) var(--ease-smooth);
        }
        
        .table-row:hover {
            background: var(--bg-card-hover);
        }
        
        .table-row:hover::before {
            background: var(--accent-primary);
        }

        .table-row.top-1 {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.08) 0%, transparent 60%);

        .table-row.top-1::before {
            background: var(--gold);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        
        .table-row.top-2 {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.06) 0%, transparent 60%);

        .table-row.top-2::before {
            background: var(--silver);
            box-shadow: 0 0 16px var(--silver-glow);
        }
        
        .table-row.top-3 {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.06) 0%, transparent 60%);

        .table-row.top-3::before {

            box-shadow: 0 0 16px var(--bronze-glow);

        .rank-cell {
            font-weight: 700;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }
        
        .rank-cell.gold { 
            color: var(--gold); 
            font-size: 24px; 
            text-shadow: 0 0 20px var(--gold-glow);
            animation: pulseGold 2s ease-in-out infinite;
        }
        .rank-cell.silver { 
            color: var(--silver); 
            font-size: 24px; 
            text-shadow: 0 0 16px var(--silver-glow);
            animation: pulseSilver 2.5s ease-in-out infinite;
        }
        .rank-cell.bronze { 
            color: var(--bronze); 
            font-size: 24px; 
            text-shadow: 0 0 16px var(--bronze-glow);
            animation: pulseBronze 3s ease-in-out infinite;
        }
        
        @keyframes pulseGold {
            0%, 100% { text-shadow: 0 0 20px var(--gold-glow); }
            50% { text-shadow: 0 0 30px var(--gold-glow), 0 0 40px var(--gold-glow); }

        @keyframes pulseSilver {
            0%, 100% { text-shadow: 0 0 16px var(--silver-glow); }
            50% { text-shadow: 0 0 24px var(--silver-glow), 0 0 32px var(--silver-glow); }
        }
        
        @keyframes pulseBronze {
            0%, 100% { text-shadow: 0 0 16px var(--bronze-glow); }
            50% { text-shadow: 0 0 24px var(--bronze-glow), 0 0 32px var(--bronze-glow); }

        .user-cell {

            align-items: center;
            gap: 14px;

        .user-avatar.silver {
            background: linear-gradient(135deg, #e8e8e8, #a0a0a0);
            box-shadow: 0 4px 12px var(--silver-glow);
        }
        
        .user-avatar.bronze {
            background: linear-gradient(135deg, #cd7f32, #a05a2c);
            box-shadow: 0 4px 12px var(--bronze-glow);
        }

        .user-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--duration-fast) var(--ease-smooth);
            word-break: break-word;
        }

        .user-link:hover {
            color: var(--accent-primary);
        }

        .value-cell {
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
        }

            color: var(--text-muted);
        }

        .revenue-cell {
            color: var(--metric-subscription);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

            color: var(--text-muted);
        }

        .progress-cell {
            position: relative;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {

            border-radius: 3px;
            transition: width 1s var(--ease-out-expo);
            position: relative;
            overflow: hidden;

           Footer
           ======================================== */

            text-align: center;
            padding: 48px 0;

            font-size: 13px;
            border-top: 1px solid var(--border-subtle);

            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .footer-brand svg {
            width: 16px;
            height: 16px;
            color: var(--accent-primary);
        }

        /* ========================================
           Responsive Design
           ======================================== */

            .leaderboard-title {

            .table-header,

        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to {

                transform: translateY(0);
            }
        }
        
        /* Staggered animations */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }

        // ========================================
        // Particle System
        // ========================================
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId;
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.2,
                    pulse: Math.random() * Math.PI * 2
                };
            }
            
            function init() {
                particles = [];
                const particleCount = Math.min(100, Math.floor(canvas.width * canvas.height / 15000));
                for (let i = 0; i < particleCount; i++) {
                    particles.push(createParticle());
                }
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.pulse += 0.02;
                    
                    // Wrap around edges
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    
                    // Draw particle
                    const currentOpacity = p.opacity * (0.7 + 0.3 * Math.sin(p.pulse));
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity})`;
                    ctx.fill();
                });
                
                // Draw connections
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(233, 69, 96, ${0.1 * (1 - dist / 150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    });
                });
                
                animationId = requestAnimationFrame(animate);
            }
            
            resize();
            init();
            animate();
            
            window.addEventListener('resize', () => {
                resize();
                init();
            });
        }

        // ========================================
        // Sparkline Chart
        // ========================================
        function drawSparkline(canvas, data, color) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            if (!data || data.length < 2) {
                // Draw flat line for zero data
                ctx.beginPath();
                ctx.moveTo(0, height / 2);
                ctx.lineTo(width, height / 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
                return;
            }
            
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            
            ctx.beginPath();
            ctx.moveTo(0, height - ((data[0] - min) / range) * (height - 4) - 2);
            
            for (let i = 1; i < data.length; i++) {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((data[i] - min) / range) * (height - 4) - 2;
                ctx.lineTo(x, y);
            }
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            
            // Draw gradient fill
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, color.replace(')', ', 0.3)').replace('rgb', 'rgba'));
            gradient.addColorStop(1, color.replace(')', ', 0)').replace('rgb', 'rgba'));
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        /**
         * Format currency
         */
        function formatCurrency(value) {
            return '$' + value.toFixed(2);
        }

        /**
         * Format number with commas
         */
        function formatNumber(num) {
            if (num === 0) return '—';
            return num.toLocaleString();
        }

        /**
         * Check if value is zero
         */
        function isZero(value) {
            return value === 0 || value === '0' || value === 0.00;
        }

        /**
         * Animate number counting up with easeOutExpo
         */
        function animateNumber(element, target, duration = 2000, isCurrency = false) {
            const start = 0;
            const startTime = performance.now();
            
            function easeOutExpo(t) {
                return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
            }
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeOutExpo(progress);
                const current = start + (target - start) * eased;
                
                element.textContent = isCurrency 
                    ? formatCurrency(current) 
                    : formatNumber(Math.floor(current));
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    element.textContent = isCurrency 
                        ? formatCurrency(target) 
                        : (isZero(target) ? '—' : formatNumber(target));
                }
            }
            
            requestAnimationFrame(update);
        }

        /**
         * Calculate total revenue for a user
         */
        function getTotalRevenue(user) {
            return (user.subscription_revenue || 0) + (user.ad_revenue || 0);
        }

        /**
         * Get user rank in leaderboard by total revenue
         */
        function getUserRank(username, sortBy = 'total_revenue') {
            if (!dashboardData || !dashboardData.users) return -1;
            
            const sorted = getSortedUsers(sortBy);
            return sorted.findIndex(u => u.username === username) + 1;
        }

        /**
         * Get sorted users array
         */
        function getSortedUsers(sortBy = 'total_revenue') {
            if (!dashboardData || !dashboardData.users) return [];
            
            const users = Object.entries(dashboardData.users).map(([username, data]) => ({
                username,
                ...data,
                total_revenue: getTotalRevenue(data)
            }));
            
            users.sort((a, b) => {
                if (sortBy === 'total_revenue') {
                    return b.total_revenue - a.total_revenue;
                }
                return (b[sortBy] || 0) - (a[sortBy] || 0);
            });
            
            return users;
        }

            trophy: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
            star: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
            warning: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
            share: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
            check: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
            arrowRight: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`
        };

        // ========================================
        // Render Functions
        // ========================================

        /**
         * Render user profile page
         */
        function renderUserPage(username, userData) {
            const totalRevenue = getTotalRevenue(userData);
            const allUsers = getSortedUsers('total_revenue');
            const userRank = allUsers.findIndex(u => u.username === username) + 1;
            const topUser = allUsers[0];
            const gap = topUser ? topUser.total_revenue - totalRevenue : 0;
            
            const t = (key) => translations[currentLang][key] || key;
            
            const metrics = [
                {
                    key: 'link_visits',
                    icon: icons.link,
                    value: userData.link_visits || 0,
                    isCurrency: false,
                    color: '#22d3ee',
                    sparkData: generateSparklineData(userData.link_visits || 0)
                },
                {
                    key: 'unique_visitors',
                    icon: icons.users,
                    value: userData.unique_visitors || 0,
                    isCurrency: false,
                    color: '#a78bfa',
                    sparkData: generateSparklineData(userData.unique_visitors || 0)
                },
                {
                    key: 'new_users',
                    icon: icons.userPlus,
                    value: userData.new_users || 0,
                    isCurrency: false,
                    color: '#34d399',
                    sparkData: generateSparklineData(userData.new_users || 0)
                },
                {
                    key: 'subscription_revenue',
                    icon: icons.dollar,
                    value: userData.subscription_revenue || 0,
                    isCurrency: true,
                    color: '#fbbf24',
                    sparkData: generateSparklineData(userData.subscription_revenue || 0)
                },
                {
                    key: 'ad_revenue',
                    icon: icons.ad,
                    value: userData.ad_revenue || 0,
                    isCurrency: true,
                    color: '#f472b6',
                    sparkData: generateSparklineData(userData.ad_revenue || 0)
                }
            ];

            return `
                <section class="page-header slide-up">
                    <p class="user-welcome">${t('welcome')}</p>
                    <h1 class="user-name">${escapeHtml(username)}</h1>
                    <div class="last-updated">
                        ${icons.clock}
                        <span>${t('last.updated')}: ${dashboardData.last_updated}</span>
                    </div>
                </section>

                <section class="stats-grid">
                    ${metrics.map((metric, index) => `
                        <div class="stat-card slide-up stagger-${index + 1}">
                            <div class="stat-header">
                                <div class="stat-icon">${metric.icon}</div>
                                <div class="sparkline-container">
                                    <canvas id="sparkline-${index}" width="60" height="30" data-values="${metric.sparkData.join(',')}" data-color="${metric.color}"></canvas>
                                </div>
                            </div>
                            <span class="stat-label">${t('metrics.' + metric.key)}</span>
                            <div class="stat-value" id="stat-${index}">${isZero(metric.value) ? '—' : '0'}</div>
                            <p class="stat-desc">${t('metrics.' + metric.key + '_desc')}</p>
                        </div>
                    `).join('')}
                </section>

                <section class="rank-section slide-up stagger-5">
                    <h2 class="rank-title">${t('rank.title')}</h2>
                    <div class="rank-number">#${userRank}</div>
                    ${userRank === 1 ? `
                        <div class="rank-badge">
                            ${icons.star}
                            <span>${t('rank.top_performer')}</span>
                        </div>
                    ` : ''}
                    <p class="rank-gap">${t('rank.of')} ${allUsers.length} • ${t('rank.gap')} <strong>${formatCurrency(gap)}</strong></p>
                    <button class="share-btn" onclick="shareStats('${encodeURIComponent(username)}')">
                        <span id="shareBtnContent">${icons.share}${t('share.btn')}</span>
                    </button>
                </section>

                <a href="dashboard.html" class="back-btn slide-up">
                    ${icons.trophy}
                    ${t('back.btn')}
                </a>
            `;
        }

        /**
         * Render leaderboard page
         */
        function renderLeaderboardPage(sortBy = 'total_revenue') {
            const sortedUsers = getSortedUsers(sortBy);
            const maxValue = sortedUsers.length > 0 
                ? (sortBy === 'total_revenue' 
                    ? getTotalRevenue(sortedUsers[0]) 
                    : sortedUsers[0][sortBy] || 1)
                : 1;
            
            const t = (key) => translations[currentLang][key] || key;
            
            const sortTabs = [
                { key: 'total_revenue', label: t('sort.total_revenue') },
                { key: 'new_users', label: t('sort.new_users') },
                { key: 'link_visits', label: t('sort.link_visits') },
                { key: 'unique_visitors', label: t('sort.unique_visitors') }
            ];

            return `
                <section class="leaderboard-header slide-up">
                    <h1 class="leaderboard-title">${t('leaderboard.title')}</h1>
                    <p class="leaderboard-subtitle">${t('leaderboard.subtitle')}</p>
                    <div class="leaderboard-stats">
                        <div class="leaderboard-stat">
                            <strong>${sortedUsers.length}</strong>
                            <span>${t('leaderboard.total_users')}</span>
                        </div>
                        <div class="last-updated">
                            ${icons.clock}
                            <span>${t('last.updated')}: ${dashboardData.last_updated}</span>
                        </div>
                    </div>
                </section>

                <div class="sort-tabs slide-up stagger-1">
                    ${sortTabs.map(tab => `
                        <button class="sort-tab ${sortBy === tab.key ? 'active' : ''}" 
                                onclick="sortLeaderboard('${tab.key}')">
                            ${tab.label}
                        </button>
                    `).join('')}
                </div>

                <div class="leaderboard-table slide-up stagger-2">
                    <div class="table-header">
                        <div class="col">${t('table.rank')}</div>
                        <div class="col">${t('table.referrer')}</div>
                        <div class="col">${t('table.link_visits')}</div>
                        <div class="col">${t('table.unique_visitors')}</div>
                        <div class="col">${t('table.new_users')}</div>
                        <div class="col">${t('table.subscription')}</div>
                        <div class="col">${t('table.ad_revenue')}</div>
                        <div class="col">${t('table.total')}</div>
                        <div class="col"></div>
                    </div>
                    <div class="table-body">
                        ${sortedUsers.map((user, index) => {
                            const rank = index + 1;
                            const total = user.total_revenue;
                            const progressPercent = maxValue > 0 ? ((total / maxValue) * 100).toFixed(1) : 0;
                            const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
                            const rowClass = rank <= 3 ? `top-${rank}` : '';
                            const initial = user.username.charAt(0).toUpperCase();
                            const encodedUsername = encodeURIComponent(user.username);
                            
                            return `
                                <div class="table-row ${rowClass}">
                                    <div class="col rank-cell ${rankClass}">
                                        ${rank <= 3 ? (rank === 1 ? '🥇' : rank === 2 ? '🥈' : '🥉') : '#' + rank}
                                    </div>
                                    <div class="col user-cell">
                                        <div class="user-avatar ${rankClass}">${escapeHtml(initial)}</div>
                                        <a href="?user=${encodedUsername}" class="user-link">
                                            ${escapeHtml(user.username)}
                                        </a>
                                    </div>
                                    <div class="col value-cell ${isZero(user.link_visits) ? 'zero' : ''}">${formatNumber(user.link_visits || 0)}</div>
                                    <div class="col value-cell ${isZero(user.unique_visitors) ? 'zero' : ''}">${formatNumber(user.unique_visitors || 0)}</div>
                                    <div class="col value-cell ${isZero(user.new_users) ? 'zero' : ''}">${formatNumber(user.new_users || 0)}</div>
                                    <div class="col revenue-cell ${isZero(user.subscription_revenue) ? 'zero' : ''}">${formatCurrency(user.subscription_revenue || 0)}</div>
                                    <div class="col revenue-cell ${isZero(user.ad_revenue) ? 'zero' : ''}">${formatCurrency(user.ad_revenue || 0)}</div>
                                    <div class="col progress-cell">
                                        <span class="value-cell">${formatCurrency(total)}</span>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                                        </div>
                                    </div>
                                    <div class="col row-detail-btn">
                                        <a href="?user=${encodedUsername}" title="${t('table.view')}">
                                            ${icons.arrowRight}
                                        </a>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        /**
         * Render error page
         */
        function renderErrorPage(username) {
            const t = (key) => translations[currentLang][key] || key;
            
            return `
                <div class="error-state slide-up">
                    <div class="error-icon">${icons.warning}</div>
                    <h2 class="error-title">${t('error.title')}</h2>
                    <p class="error-message">${t('error.message')}</p>
                    <a href="dashboard.html" class="back-btn">
                        ${icons.trophy}
                        ${t('error.back')}
                    </a>
                </div>
            `;
        }

        /**
         * Main render function
         */
        function renderContent() {
            const mainContent = document.getElementById('mainContent');
            const userParam = getUrlParam('user');
            
            if (userParam) {
                const userData = dashboardData?.users?.[userParam];
                
                if (userData) {
                    mainContent.innerHTML = renderUserPage(userParam, userData);
                    
                    // Animate numbers and sparklines after a short delay
                    setTimeout(() => {
                        const metrics = [
                            { value: userData.link_visits || 0, isCurrency: false },
                            { value: userData.unique_visitors || 0, isCurrency: false },
                            { value: userData.new_users || 0, isCurrency: false },
                            { value: userData.subscription_revenue || 0, isCurrency: true },
                            { value: userData.ad_revenue || 0, isCurrency: true }
                        ];
                        
                        metrics.forEach((metric, index) => {
                            const element = document.getElementById(`stat-${index}`);
                            if (element) {
                                animateNumber(element, metric.value, 2000, metric.isCurrency);
                            }
                            
                            // Draw sparklines
                            const canvas = document.getElementById(`sparkline-${index}`);
                            if (canvas) {
                                const values = canvas.dataset.values.split(',').map(Number);
                                const color = canvas.dataset.color;
                                drawSparkline(canvas, values, color);
                            }
                        });
                    }, 400);
                } else {
                    mainContent.innerHTML = renderErrorPage(userParam);
                }
            } else {
                const sortBy = localStorage.getItem('dashboardSortBy') || 'total_revenue';
                mainContent.innerHTML = renderLeaderboardPage(sortBy);
            }
        }

        /**
         * Sort leaderboard by column
         */
        function sortLeaderboard(sortBy) {
            localStorage.setItem('dashboardSortBy', sortBy);
            
            // Add transition effect
            const table = document.querySelector('.leaderboard-table');
            if (table) {
                table.style.opacity = '0';
                table.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    renderContent();
                    const newTable = document.querySelector('.leaderboard-table');
                    if (newTable) {
                        newTable.style.opacity = '1';
                        newTable.style.transform = 'translateY(0)';
                    }
                }, 200);
            } else {
                renderContent();
            }
        }

        /**
         * Share stats functionality
         */
        function shareStats(username) {
            const url = `${window.location.origin}${window.location.pathname}?user=${username}`;
            
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.share-btn');
                const content = document.getElementById('shareBtnContent');
                const t = (key) => translations[currentLang][key] || key;
                
                btn.classList.add('copied');
                content.innerHTML = `${icons.check}${t('share.copied')}`;
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    content.innerHTML = `${icons.share}${t('share.btn')}`;
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const btn = document.querySelector('.share-btn');
                const content = document.getElementById('shareBtnContent');
                const t = (key) => translations[currentLang][key] || key;
                
                btn.classList.add('copied');
                content.innerHTML = `${icons.check}${t('share.copied')}`;
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    content.innerHTML = `${icons.share}${t('share.btn')}`;
                }, 2000);
            });
        }

        // ========================================
        // Theme Toggle
        // ========================================
        function initTheme() {
            const savedTheme = localStorage.getItem('dashboardTheme') || 'dark';
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');
            
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            if (savedTheme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('dashboardTheme', newTheme);
            
            if (newTheme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // ========================================
        // Loading Screen
        // ========================================
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loadingScreen');
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, 1800);
        }

        // ========================================
        // Data Loading
        // ========================================
        
        function loadData() {
            dashboardData = DATA;
            
            const savedLang = localStorage.getItem('dashboardLang');
            if (savedLang) {
                currentLang = savedLang;
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === savedLang);
                });
            }
            
            renderContent();
            hideLoadingScreen();
        }

        // ========================================
        // Event Listeners
        // ========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize particles
            initParticles();
            
            // Initialize theme
            initTheme();
            
            // Theme toggle button
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }
            
            // Language switch buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    setLanguage(btn.dataset.lang);
                });
            });
            
            // Load embedded data
            loadData();
        });

        // Handle URL changes (browser back/forward)
        window.addEventListener('popstate', renderContent);
    </script>
</body>
</html>
