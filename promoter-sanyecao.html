<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>三叶草 · NovelFlow 推广中心</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#7c3aed;--primary-deep:#6d28d9;--primary-soft:#a78bfa;
  --ink:#1e1b4b;--ink-sec:#4c1d95;--ink-mute:#6b7280;
  --canvas:#fff;--canvas-soft:#faf5ff;--canvas-deep:#f3e8ff;
  --hairline:#e9d5ff;--success:#059669;--danger:#dc2626;--gold:#d97706;
  --shadow:0 1px 3px rgba(124,58,237,.08),0 8px 24px rgba(124,58,237,.06);
  --r-md:10px;--r-lg:14px;
}
body{font-family:'Noto Sans SC','Inter',-apple-system,sans-serif;font-weight:400;background:linear-gradient(135deg,#faf5ff 0%,#f5f3ff 50%,#ede9fe 100%);color:var(--ink);min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#581c87 0%,#7c3aed 50%,#9333ea 100%);color:#fff;padding:24px 20px 40px;position:relative;overflow:hidden}
.header::before{content:'☘️';position:absolute;right:-20px;top:-20px;font-size:160px;opacity:.08;transform:rotate(-15deg)}
.header-inner{max-width:960px;margin:0 auto;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:10px;font-size:13px;opacity:.75;margin-bottom:8px;letter-spacing:1px}
.brand-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.subtitle{font-size:14px;opacity:.85;font-weight:300}

/* Login */
.login-wrap{max-width:400px;margin:-20px auto 0;padding:0 20px;position:relative;z-index:2}
.login-card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);padding:32px 28px}
.login-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--ink)}
.login-sub{font-size:13px;color:var(--ink-mute);text-align:center;margin-bottom:22px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--hairline);border-radius:var(--r-md);font-size:15px;font-family:inherit;outline:none;transition:border .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .2s}
.login-btn:hover{background:var(--primary-deep)}.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.login-tip{font-size:11px;color:var(--ink-mute);text-align:center;margin-top:14px}

/* Dashboard */
.dash{max-width:960px;margin:-20px auto 0;padding:0 20px 40px;position:relative;z-index:2}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px 16px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:var(--primary);line-height:1.2}
.stat-val.gold{color:var(--gold)}
.stat-label{font-size:12px;color:var(--ink-mute);margin-top:4px}

/* Section */
.section{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.section-head{padding:18px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f5f3ff}
.section-title{font-size:16px;font-weight:600}
.section-sub{font-size:12px;color:var(--ink-mute);margin-top:2px}
.copy-all-btn{padding:6px 14px;background:var(--canvas-deep);color:var(--primary);border:1px solid var(--hairline);border-radius:var(--r-md);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.copy-all-btn:hover{background:var(--primary);color:#fff}

/* Table */
.book-table{width:100%;border-collapse:collapse;font-size:13px}
.book-table th{background:var(--canvas-soft);padding:10px 14px;text-align:left;font-weight:500;color:var(--ink-sec);font-size:12px;border-bottom:1px solid var(--hairline);white-space:nowrap}
.book-table td{padding:12px 14px;border-bottom:1px solid #faf5ff;vertical-align:middle}
.book-table tr:last-child td{border-bottom:none}
.book-table tr:hover td{background:var(--canvas-soft)}
.book-title{font-weight:500;color:var(--ink);line-height:1.4;max-width:280px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-lang{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.book-lang.en{background:#dbeafe;color:#1e40af}
.book-lang.es{background:#fef3c7;color:#92400e}
.book-code{font-family:'SF Mono',Consolas,monospace;font-weight:600;color:var(--primary);background:var(--canvas-deep);padding:3px 8px;border-radius:5px;font-size:12px}
.book-link{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:var(--primary);text-decoration:none;word-break:break-all}
.book-link:hover{text-decoration:underline}
.copy-btn{padding:4px 10px;background:#f5f3ff;color:var(--primary);border:1px solid var(--hairline);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.copy-btn:hover{background:var(--primary);color:#fff}
.copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}
.book-stats{font-size:12px;color:var(--ink-mute)}
.book-stats strong{color:var(--ink);font-weight:600}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1b4b;color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}

/* Logout */
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:var(--r-md);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;position:absolute;top:20px;right:20px}
.logout-btn:hover{background:rgba(255,255,255,.15)}

/* Empty / Loading */
.loading,.empty{padding:40px 20px;text-align:center;color:var(--ink-mute);font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--canvas-deep);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--ink-mute)}

/* Responsive */
@media(max-width:640px){
  .book-table{font-size:12px}
  .book-table th,.book-table td{padding:8px 10px}
  .book-title{max-width:160px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .section-head{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Login View -->
<div id="loginView">
  <div class="header">
    <div class="header-inner">
      <div class="brand"><span class="brand-dot"></span> NOVELFLOW · PROMOTER</div>
      <h1>☘️ 三叶草推广中心</h1>
      <div class="subtitle">登录查看你的专属推广链接与数据</div>
    </div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">账号登录</div>
      <div class="login-sub">请使用管理员分配的账号密码</div>
      <input type="text" class="login-input" id="usernameInput" placeholder="账号" value="sanyecao" autocomplete="username">
      <input type="password" class="login-input" id="passwordInput" placeholder="密码" autocomplete="current-password">
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
      <div class="login-err" id="loginErr"></div>
      <div class="login-tip">账号密码请联系管理员获取</div>
    </div>
  </div>
</div>

<!-- Dashboard View -->
<div id="dashView" style="display:none">
  <div class="header">
    <button class="logout-btn" onclick="handleLogout()">退出登录</button>
    <div class="header-inner">
      <div class="brand"><span class="brand-dot"></span> NOVELFLOW · PROMOTER CONSOLE</div>
      <h1>☘️ 你好，<span id="userName">三叶草</span></h1>
      <div class="subtitle">共 <strong id="totalBooks" style="font-weight:600">0</strong> 本待推广书籍，数据每日更新</div>
    </div>
  </div>
  <div class="dash">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="stBooks">0</div><div class="stat-label">可推书籍</div></div>
      <div class="stat-card"><div class="stat-val" id="stVisits">0</div><div class="stat-label">总点击</div></div>
      <div class="stat-card"><div class="stat-val" id="stUnique">0</div><div class="stat-label">独立访客</div></div>
      <div class="stat-card"><div class="stat-val" id="stNew">0</div><div class="stat-label">新增读者</div></div>
      <div class="stat-card"><div class="stat-val gold" id="stIncome">$0</div><div class="stat-label">预估收益</div></div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <div class="section-title">📚 我的推广书单</div>
          <div class="section-sub">点击链接即可复制，分享到你的推广渠道</div>
        </div>
        <button class="copy-all-btn" onclick="copyAllLinks()">📋 复制全部链接</button>
      </div>
      <div style="overflow-x:auto">
        <table class="book-table">
          <thead>
            <tr>
              <th>#</th>
              <th>书名</th>
              <th>语言</th>
              <th>Code</th>
              <th>推广链接</th>
              <th>数据</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="bookTbody"></tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      NovelFlow © 2026 · 数据实时更新 · 如有问题联系管理员
    </div>
  </div>
</div>

<script>
const API_BASE = '';  // same origin
let currentUser = null;

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2200);
}

// Check existing cookie session on load
async function init() {
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  // Try /api/auth/me to see if already logged in
  try {
    const resp = await fetch(API_BASE + '/api/auth/me', {credentials:'include'});
    if (resp.ok) {
      const data = await resp.json();
      if (data.user && data.user.username) {
        // Only allow sanyecao here (or admin)
        currentUser = data.user.username;
        showDash();
        return;
      }
    }
  } catch(e){}
  // Show login
  document.getElementById('loginView').style.display='';
}

async function handleLogin() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请输入账号和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const resp = await fetch(API_BASE + '/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({username, password})
    });
    const data = await resp.json();
    if (data.success) {
      currentUser = data.username || data.user?.username;
      showDash();
    } else {
      errEl.textContent = data.error || '登录失败';
    }
  } catch(e) {
    errEl.textContent = '网络错误，请重试';
  }
  btn.disabled = false; btn.textContent = '登 录';
}

function handleLogout() {
  fetch(API_BASE + '/api/auth/logout', {method:'POST', credentials:'include'}).finally(()=>{
    currentUser=null;
    document.getElementById('loginView').style.display='';
    document.getElementById('dashView').style.display='none';
  });
}

async function showDash() {
  document.getElementById('loginView').style.display='none';
  document.getElementById('dashView').style.display='';
  document.getElementById('userName').textContent = currentUser === 'sanyecao' ? '三叶草' : currentUser;
  await loadData();
}

async function loadData() {
  const tbody = document.getElementById('bookTbody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading"><div class="spinner"></div><br>加载中...</td></tr>';
  try {
    const resp = await fetch(API_BASE + '/api/promoter/me-stats', {credentials:'include'});
    if (resp.status === 401) {
      // Session expired - go back to login
      handleLogout();
      return;
    }
    const data = await resp.json();
    if (data.error && !data.books) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">数据加载失败: ' + escapeHtml(data.error) + '</td></tr>';
      return;
    }
    renderBooks(data);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading">加载失败，请刷新重试</td></tr>';
  }
}

function renderBooks(data) {
  const books = data.books || [];
  // Sort: English first, then Spanish, then by code
  books.sort((a,b) => {
    const la = (a.lang || 'en').toLowerCase(), lb = (b.lang || 'en').toLowerCase();
    if (la !== lb) return la === 'en' ? -1 : 1;
    return (a.code || '').localeCompare(b.code || '');
  });

  document.getElementById('totalBooks').textContent = books.length;
  document.getElementById('stBooks').textContent = books.length;
  document.getElementById('stVisits').textContent = fmtNum(data.total_visits || 0);
  document.getElementById('stUnique').textContent = fmtNum(data.total_unique || 0);
  document.getElementById('stNew').textContent = fmtNum(data.total_new || 0);
  document.getElementById('stIncome').textContent = '$' + fmtNum(data.total_income || 0, true);

  const tbody = document.getElementById('bookTbody');
  if (books.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无可推广书籍，请联系管理员分配</td></tr>';
    return;
  }

  tbody.innerHTML = books.map((b, i) => {
    const lang = (b.lang || 'en').toLowerCase();
    const link = b.link || (b.shortUrl ? 'https://' + b.shortUrl : '');
    const visits = b.visits || b.total_visits || 0;
    const newUsers = b.new_users || b.total_new || 0;
    return `<tr>
      <td style="color:var(--ink-mute)">${i+1}</td>
      <td><div class="book-title" title="${escapeHtml(b.matchedBookName || b.bookName || 'Unknown')}">${escapeHtml(b.matchedBookName || b.bookName || 'Unknown')}</div></td>
      <td><span class="book-lang ${lang}">${lang === 'en' ? 'EN' : 'ES'}</span></td>
      <td><span class="book-code">${b.code || '-'}</span></td>
      <td>${link ? `<a class="book-link" href="${link}" target="_blank" rel="noopener">${link.replace('https://','')}</a>` : '-'}</td>
      <td class="book-stats"><strong>${fmtNum(visits)}</strong> 点击<br>${fmtNum(newUsers)} 新增</td>
      <td>${link ? `<button class="copy-btn" onclick="copyText('${link}', this)">复制</button>` : '-'}</td>
    </tr>`;
  }).join('');
}

function fmtNum(n, decimal) {
  if (!n) return decimal ? '0.00' : '0';
  if (decimal) return Number(n).toFixed(2);
  return Number(n).toLocaleString();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) { btn.textContent='已复制 ✓'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},1500); }
    toast('链接已复制');
  } catch(e) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('链接已复制');
  }
}

async function copyAllLinks() {
  const books = [];
  document.querySelectorAll('#bookTbody tr').forEach(tr => {
    const a = tr.querySelector('.book-link');
    const title = tr.querySelector('.book-title');
    if (a && title) books.push(`${title.textContent}: ${a.href}`);
  });
  if (books.length === 0) { toast('暂无链接', true); return; }
  const text = books.join('\n');
  await copyText(text);
}

init();
</script>
</body>
</html>
