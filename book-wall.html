<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelFlow KOC — 书籍推荐墙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #050714; color: #c8cdd5; line-height: 1.7; font-size: 15px; min-height: 100vh; }
a { color: #7c6cff; text-decoration: none; transition: color .2s; }
a:hover { color: #a89cff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0d1f; }
::-webkit-scrollbar-thumb { background: #2a2d45; border-radius: 3px; }
.container { max-width: 1000px; margin: 0 auto; padding: 48px 24px 80px; }
.hero { text-align: center; margin-bottom: 40px; }
.hero-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; background: rgba(124, 108, 255, 0.12); border: 1px solid rgba(124, 108, 255, 0.25); color: #a89cff; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 20px; }
.hero h1 { font-size: 36px; font-weight: 800; line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.5px; }
.hero h1 .gradient-text { background: linear-gradient(135deg, #7c6cff 0%, #00d4ff 50%, #7c6cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 200% auto; animation: shimmer 3s ease-in-out infinite; }
@keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }
.hero p { font-size: 16px; color: #8a8faa; max-width: 520px; margin: 0 auto; line-height: 1.7; }
.stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
.stat-card { background: linear-gradient(135deg, rgba(124, 108, 255, 0.08), rgba(0, 212, 255, 0.05)); border: 1px solid rgba(124, 108, 255, 0.12); border-radius: 16px; padding: 24px; text-align: center; transition: transform .2s, border-color .2s; }
.stat-card:hover { transform: translateY(-2px); border-color: rgba(124, 108, 255, 0.25); }
.stat-value { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #7c6cff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
.stat-label { font-size: 13px; color: #6a6f8a; font-weight: 500; }
.pending-alert { display: none; background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; text-align: center; animation: pulse 2s ease-in-out infinite; }
.pending-alert.show { display: block; }
.pending-alert p { color: #ffc107; font-size: 14px; margin: 0; }
.pending-alert .retry-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255, 193, 7, 0.3); border-top-color: #ffc107; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
.book-card { background: linear-gradient(135deg, rgba(14, 17, 38, 0.9), rgba(10, 13, 31, 0.95)); border: 1px solid rgba(124, 108, 255, 0.08); border-radius: 16px; padding: 24px; transition: transform .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
.book-card:hover { transform: translateY(-4px); border-color: rgba(124, 108, 255, 0.2); box-shadow: 0 12px 40px rgba(124, 108, 255, 0.1); }
.book-card.has-link { border-color: rgba(0, 212, 130, 0.2); }
.book-card.has-link:hover { box-shadow: 0 12px 40px rgba(0, 212, 130, 0.1); }
.book-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
.book-icon { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, rgba(124, 108, 255, 0.2), rgba(0, 212, 255, 0.15)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.book-title { font-size: 17px; font-weight: 700; color: #eef0f6; line-height: 1.4; margin-bottom: 6px; }
.book-meta { font-size: 12px; color: #6a6f8a; display: flex; align-items: center; gap: 6px; }
.book-link-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; margin-left: 8px; }
.book-link-badge.ready { background: rgba(0, 212, 130, 0.15); color: #00d4aa; }
.book-link-badge.pending { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
.book-stats { display: flex; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.06); }
.book-stat { text-align: center; flex: 1; }
.book-stat-value { font-size: 20px; font-weight: 700; color: #00d4ff; }
.book-stat-label { font-size: 11px; color: #6a6f8a; margin-top: 2px; }
.book-expand { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.06); }
.book-card.expanded .book-expand { display: block; }
.book-card.expanded .expand-hint { display: none; }
.expand-hint { font-size: 12px; color: #5a5f7a; margin-top: 12px; text-align: center; }
.expand-link { display: none; margin-top: 12px; padding: 10px 14px; background: rgba(0, 212, 130, 0.1); border: 1px solid rgba(0, 212, 130, 0.2); border-radius: 8px; text-align: center; }
.book-card.has-link .expand-link { display: block; }
.expand-link a { color: #00d4aa; font-size: 13px; font-weight: 500; }
.recommender-list { list-style: none; padding: 0; margin: 0; }
.recommender-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
.recommender-item:last-child { border-bottom: none; }
.recommender-avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, rgba(124, 108, 255, 0.3), rgba(0, 212, 255, 0.2)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #a89cff; flex-shrink: 0; }
.recommender-info { flex: 1; min-width: 0; }
.recommender-name { font-size: 13px; font-weight: 500; color: #c8cdd5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recommender-method { font-size: 11px; color: #5a5f7a; }
.method-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; background: rgba(0, 212, 255, 0.08); border: 1px solid rgba(0, 212, 255, 0.15); color: #5cc8e8; font-size: 11px; font-weight: 500; }
.loading { text-align: center; padding: 60px 20px; }
.loading-spinner { width: 48px; height: 48px; border: 3px solid rgba(124, 108, 255, 0.2); border-top-color: #7c6cff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
.empty-state { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, rgba(14, 17, 38, 0.6), rgba(10, 13, 31, 0.8)); border: 1px dashed rgba(124, 108, 255, 0.2); border-radius: 20px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: #a0a4c0; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: #6a6f8a; }
.nav-links { text-align: center; margin-top: 32px; display: flex; gap: 24px; justify-content: center; }
.nav-links a { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; background: rgba(124, 108, 255, 0.08); border: 1px solid rgba(124, 108, 255, 0.15); font-size: 13px; font-weight: 500; transition: all .2s; }
.nav-links a:hover { background: rgba(124, 108, 255, 0.15); border-color: rgba(124, 108, 255, 0.3); color: #a89cff; }
.last-updated { text-align: center; margin-top: 24px; font-size: 12px; color: #5a5f7a; }
@media (max-width: 640px) { .container { padding: 32px 16px 60px; } .hero h1 { font-size: 28px; } .stats-bar { grid-template-columns: 1fr; gap: 12px; } .book-grid { grid-template-columns: 1fr; } .nav-links { flex-direction: column; gap: 12px; } .nav-links a { width: 100%; justify-content: center; } }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-badge">📖 书单推荐墙</div>
    <h1>大家都在推荐 <span class="gradient-text">什么书？</span></h1>
    <p>查看 KOC 社区推荐的所有书籍，发现热门推荐，发现志同道合的推广伙伴！</p>
  </div>

  <div class="pending-alert" id="pendingAlert">
    <p><span class="retry-spinner"></span><span id="pendingText">Processing pending submissions...</span></p>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="totalBooks">-</div><div class="stat-label">推荐书籍总数</div></div>
    <div class="stat-card"><div class="stat-value" id="totalRecommenders">-</div><div class="stat-label">Recommenders</div></div>
    <div class="stat-card"><div class="stat-value" id="topMethod">-</div><div class="stat-label">最热推广方式</div></div>
  </div>

  <div class="loading" id="loadingState"><div class="loading-spinner"></div><p>正在加载书单...</p></div>
  <div class="empty-state" id="emptyState" style="display: none;"><div class="empty-icon">📚</div><h3>No Recommendations Yet</h3><p>Be the first to recommend a book!</p></div>
  <div class="book-grid" id="bookGrid" style="display: none;"></div>

  <div class="nav-links"><a href="book-submit.html">➕ Submit a Book</a></div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
const DATA_URL = 'submissions.json';
let allSubmissions = [];
let pendingCount = 0;
let isRetrying = false;

function getMethodIcon(method) { const icons = { 'Facebook Groups': '👥', 'Facebook Pages': '📄', 'Discord': '💬', 'TikTok': '🎵', 'Reels': '🎬', 'Other': '🔗' }; return icons[method] || '📢'; }
function getInitials(name) { const parts = name.split(/[\s_#-]+/); if (parts.length >= 2) { return (parts[0][0] + parts[1][0]).toUpperCase(); } return name.substring(0, 2).toUpperCase(); }
function anonymizeName(name) { const match = name.match(/^([a-zA-Z_]+)/); if (match) { const firstPart = match[1]; if (firstPart.length <= 3) { return firstPart + '***'; } return firstPart.substring(0, 3) + '***'; } return name.substring(0, 3) + '***'; }

function aggregateBooks(submissions) {
  const bookMap = {};
  pendingCount = 0;
  submissions.forEach(sub => {
    const bookName = sub.bookName.toLowerCase().trim();
    if (!bookMap[bookName]) { bookMap[bookName] = { bookName: sub.bookName, recommenders: [], hasLink: false, link: null, hasPending: false }; }
    if (sub.status === 'completed' && sub.link) { bookMap[bookName].hasLink = true; bookMap[bookName].link = sub.link; }
    if (sub.status === 'pending' || sub.status === 'failed') { bookMap[bookName].hasPending = true; pendingCount++; }
    bookMap[bookName].recommenders.push({ anonymizedName: anonymizeName(sub.discordUsername), method: sub.promotionMethod });
  });
  return Object.values(bookMap).sort((a, b) => b.recommenders.length - a.recommenders.length);
}

function getTopMethod(submissions) { const methodCount = {}; submissions.forEach(sub => { methodCount[sub.promotionMethod] = (methodCount[sub.promotionMethod] || 0) + 1; }); let topMethod = ''; let maxCount = 0; Object.entries(methodCount).forEach(([method, count]) => { if (count > maxCount) { maxCount = count; topMethod = method; } }); return topMethod; }

function renderBooks(aggregatedBooks) {
  const grid = document.getElementById('bookGrid');
  const loading = document.getElementById('loadingState');
  const empty = document.getElementById('emptyState');
  const pendingAlert = document.getElementById('pendingAlert');
  
  loading.style.display = 'none';
  
  if (aggregatedBooks.length === 0) { empty.style.display = 'block'; grid.style.display = 'none'; pendingAlert.classList.remove('show'); return; }
  
  empty.style.display = 'none'; grid.style.display = 'grid';
  const topMethod = getTopMethod(allSubmissions);
  document.getElementById('totalBooks').textContent = aggregatedBooks.length;
  document.getElementById('totalRecommenders').textContent = allSubmissions.length;
  document.getElementById('topMethod').textContent = getMethodIcon(topMethod) || '-';
  
  if (pendingCount > 0) {
    document.getElementById('pendingText').textContent = `${pendingCount} pending submission${pendingCount > 1 ? 's' : ''} - automatically retrying...`;
    pendingAlert.classList.add('show');
    if (!isRetrying) { retryPendingLoop(); }
  } else { pendingAlert.classList.remove('show'); }
  
  grid.innerHTML = aggregatedBooks.map(book => {
    const methodCount = {}; book.recommenders.forEach(r => { methodCount[r.method] = (methodCount[r.method] || 0) + 1; });
    const cardClass = book.hasLink ? 'book-card has-link' : 'book-card';
    return `
      <div class="${cardClass}" onclick="toggleExpand(this)">
        <div class="book-header">
          <div class="book-icon">📚</div>
          <div>
            <div class="book-title">${escapeHtml(book.bookName)}</div>
            <div class="book-meta"><span>👤 ${book.recommenders.length} 人推荐</span>
              ${book.hasLink ? '<span class="book-link-badge ready">✅ Link Ready</span>' : ''}
              ${book.hasPending && !book.hasLink ? '<span class="book-link-badge pending">⏳ Creating...</span>' : ''}
            </div>
          </div>
        </div>
        <div class="book-stats">${Object.entries(methodCount).map(([method, count]) => `<div class="book-stat"><div class="book-stat-value">${getMethodIcon(method)}</div><div class="book-stat-label">${count}人 · ${method}</div></div>`).join('')}</div>
        <div class="expand-link"><a href="${escapeHtml(book.link)}" target="_blank" onclick="event.stopPropagation();">🔗 Open Referral Link</a></div>
        <div class="expand-hint">点击查看推荐者详情</div>
        <div class="book-expand">
          <div style="font-size: 12px; color: #6a6f8a; margin-bottom: 10px;">推荐者（已匿名处理）</div>
          <ul class="recommender-list">${book.recommenders.map(r => `<li class="recommender-item"><div class="recommender-avatar">${getInitials(r.anonymizedName)}</div><div class="recommender-info"><div class="recommender-name">${escapeHtml(r.anonymizedName)}</div><div class="recommender-method"><span class="method-badge">${getMethodIcon(r.method)} ${r.method}</span></div></div></li>`).join('')}</ul>
        </div>
      </div>`;
  }).join('');
}

function toggleExpand(card) { card.classList.toggle('expanded'); }
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

async function retryPendingLoop() {
  if (isRetrying) return;
  isRetrying = true;
  try {
    while (pendingCount > 0) {
      try {
        const response = await fetch('/api/retry-pending', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        if (!response.ok) break;
        const result = await response.json();
        if (result.remaining === 0) { pendingCount = 0; document.getElementById('pendingText').textContent = 'All done! Refreshing...'; setTimeout(() => window.location.reload(), 1500); break; }
        pendingCount = result.remaining;
        document.getElementById('pendingText').textContent = `${pendingCount} remaining - retrying...`;
        await new Promise(resolve => setTimeout(resolve, 5000));
      } catch (err) { console.error('Retry error:', err); break; }
    }
  } finally { isRetrying = false; }
}

async function loadData() {
  try {
    const response = await fetch(DATA_URL + '?t=' + Date.now());
    if (!response.ok) throw new Error('Failed to load data');
    allSubmissions = await response.json();
    document.getElementById('lastUpdated').textContent = `最后更新: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
    const aggregatedBooks = aggregateBooks(allSubmissions);
    renderBooks(aggregatedBooks);
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('loadingState').innerHTML = '<div style="color: #ff8888;">加载失败，请刷新页面重试</div>';
  }
}

loadData();
setInterval(() => { if (!isRetrying) { loadData(); } }, 60000);
</script>
</body>
</html>
