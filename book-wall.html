<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelFlow — Book Recommendation Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #050714;
  color: #c8cdd5;
  line-height: 1.7;
  font-size: 15px;
  min-height: 100vh;
}
a { color: #7c6cff; text-decoration: none; transition: color .2s; }
a:hover { color: #a89cff; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0d1f; }
::-webkit-scrollbar-thumb { background: #2a2d45; border-radius: 3px; }

/* ===== Main Container ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ===== Hero Section ===== */
.hero {
  text-align: center;
  margin-bottom: 40px;
}
.hero-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(124, 108, 255, 0.12);
  border: 1px solid rgba(124, 108, 255, 0.25);
  color: #a89cff;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}
.hero h1 {
  font-size: 36px;
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.hero h1 .gradient-text {
  background: linear-gradient(135deg, #7c6cff 0%, #00d4ff 50%, #7c6cff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% auto;
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { background-position: 0% center; }
  50% { background-position: 200% center; }
}
.hero p {
  font-size: 16px;
  color: #8a8faa;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== Stats Bar ===== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}
.stat-card {
  background: linear-gradient(135deg, rgba(124, 108, 255, 0.08), rgba(0, 212, 255, 0.05));
  border: 1px solid rgba(124, 108, 255, 0.12);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  transition: transform .2s, border-color .2s;
}
.stat-card:hover {
  transform: translateY(-2px);
  border-color: rgba(124, 108, 255, 0.25);
}
.stat-value {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #7c6cff, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 13px;
  color: #6a6f8a;
  font-weight: 500;
}

/* ===== Book Grid ===== */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

/* ===== Book Card ===== */
.book-card {
  background: linear-gradient(135deg, rgba(14, 17, 38, 0.9), rgba(10, 13, 31, 0.95));
  border: 1px solid rgba(124, 108, 255, 0.08);
  border-radius: 16px;
  padding: 24px;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  cursor: pointer;
}
.book-card:hover {
  transform: translateY(-4px);
  border-color: rgba(124, 108, 255, 0.2);
  box-shadow: 0 12px 40px rgba(124, 108, 255, 0.1);
}
.book-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 16px;
}
.book-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(124, 108, 255, 0.2), rgba(0, 212, 255, 0.15));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.book-title {
  font-size: 17px;
  font-weight: 700;
  color: #eef0f6;
  line-height: 1.4;
  margin-bottom: 6px;
}
.book-meta {
  font-size: 12px;
  color: #6a6f8a;
  display: flex;
  align-items: center;
  gap: 6px;
}
.book-expand {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}
.book-card.expanded .book-expand {
  display: block;
}
.book-card.expanded .expand-hint {
  display: none;
}
.expand-hint {
  font-size: 12px;
  color: #5a5f7a;
  margin-top: 12px;
  text-align: center;
}

/* ===== Book Item (inside recommender card) ===== */
.book-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.book-item {
  padding: 10px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}
.book-item:last-child {
  border-bottom: none;
}
.book-item-name {
  font-size: 14px;
  font-weight: 600;
  color: #eef0f6;
  margin-bottom: 4px;
}
.book-item-link {
  font-size: 12px;
  color: #7c6cff;
  margin-bottom: 2px;
}
.book-item-link a {
  color: #7c6cff;
  text-decoration: none;
}
.book-item-link a:hover {
  color: #a89cff;
  text-decoration: underline;
}
.book-item-pending {
  font-size: 12px;
  color: #5a5f7a;
  font-style: italic;
}

/* ===== Status States ===== */
.book-item-matched {
  font-size: 11px;
  color: #7c6cff;
  font-style: italic;
  margin-top: 2px;
}

/* Pending state */
.book-item-pending-state {
  opacity: 0.7;
}
.book-item-pending-name {
  color: #8a8faa !important;
}
.book-item-pending-text {
  font-size: 12px;
  color: #5a5f7a;
  font-style: italic;
}

/* Failed state */
.book-item-failed-state {
  opacity: 0.8;
}
.book-item-failed-name {
  color: #ff8888 !important;
}
.book-item-failed-text {
  font-size: 12px;
  color: #ff6b6b;
  font-style: italic;
}

/* ===== Loading State ===== */
.loading {
  text-align: center;
  padding: 60px 20px;
}
.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid rgba(124, 108, 255, 0.2);
  border-top-color: #7c6cff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading p {
  color: #6a6f8a;
  font-size: 14px;
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, rgba(14, 17, 38, 0.6), rgba(10, 13, 31, 0.8));
  border: 1px dashed rgba(124, 108, 255, 0.2);
  border-radius: 20px;
}
.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state h3 {
  font-size: 18px;
  font-weight: 600;
  color: #a0a4c0;
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 14px;
  color: #6a6f8a;
}

/* ===== Navigation Links ===== */
.nav-links {
  text-align: center;
  margin-top: 32px;
  display: flex;
  gap: 24px;
  justify-content: center;
}
.nav-links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 10px;
  background: rgba(124, 108, 255, 0.08);
  border: 1px solid rgba(124, 108, 255, 0.15);
  font-size: 13px;
  font-weight: 500;
  transition: all .2s;
}
.nav-links a:hover {
  background: rgba(124, 108, 255, 0.15);
  border-color: rgba(124, 108, 255, 0.3);
  color: #a89cff;
}

/* ===== Last Updated ===== */
.last-updated {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: #5a5f7a;
}

/* ===== Mobile Responsive ===== */
@media (max-width: 640px) {
  .container {
    padding: 32px 16px 60px;
  }
  .hero h1 {
    font-size: 28px;
  }
  .stats-bar {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .book-grid {
    grid-template-columns: 1fr;
  }
  .nav-links {
    flex-direction: column;
    gap: 12px;
  }
  .nav-links a {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-badge">📖 Book Recommendation Wall</div>
    <h1>What's Everyone Recommending <span class="gradient-text">Next?</span></h1>
    <p>Browse all books recommended by our community. Discover trending picks and find fellow promoters!</p>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="totalBooks">-</div>
      <div class="stat-label">Total Books</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalRecommenders">-</div>
      <div class="stat-label">Recommenders</div>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <p>Loading recommendations...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <div class="empty-icon">📚</div>
    <h3>No Recommendations Yet</h3>
    <p>Be the first to recommend a book!</p>
  </div>

  <!-- Book Grid -->
  <div class="book-grid" id="bookGrid" style="display: none;"></div>

  <!-- Navigation Links -->
  <div class="nav-links">
    <a href="book-submit.html">➕ Submit a Book</a>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
const DATA_URL = '/api/submissions';
let allSubmissions = [];

function anonymizeName(name) {
  // Only show first part of name, hide numbers
  const match = name.match(/^([a-zA-Z_]+)/);
  if (match) {
    const firstPart = match[1];
    if (firstPart.length <= 3) {
      return firstPart + '***';
    }
    return firstPart.substring(0, 3) + '***';
  }
  return name.substring(0, 3) + '***';
}

function aggregateByRecommender(submissions) {
  const recommenderMap = {};
  
  submissions.forEach(sub => {
    const name = anonymizeName(sub.discordUsername);
    if (!recommenderMap[name]) {
      recommenderMap[name] = { books: [] };
    }
    recommenderMap[name].books.push({
      bookName: sub.bookName,
      code: sub.code || '',
      link: sub.link || '',
      method: sub.promotionMethod,
      status: sub.status || null,
      matchedBookName: sub.matchedBookName || null
    });
  });
  
  return Object.entries(recommenderMap).map(([name, data]) => ({
    name,
    books: data.books,
    bookCount: data.books.length
  })).sort((a, b) => b.bookCount - a.bookCount);
}

function renderBooks(aggregatedRecommenders) {
  const grid = document.getElementById('bookGrid');
  const loading = document.getElementById('loadingState');
  const empty = document.getElementById('emptyState');
  
  loading.style.display = 'none';
  
  if (aggregatedRecommenders.length === 0) {
    empty.style.display = 'block';
    grid.style.display = 'none';
    return;
  }
  
  empty.style.display = 'none';
  grid.style.display = 'grid';
  
  // Count unique books and recommenders
  const uniqueBooks = new Set(allSubmissions.map(s => s.bookName.toLowerCase().trim())).size;
  const uniqueRecommenders = aggregatedRecommenders.length;
  
  // Update stats
  document.getElementById('totalBooks').textContent = uniqueBooks;
  document.getElementById('totalRecommenders').textContent = uniqueRecommenders;
  
  grid.innerHTML = aggregatedRecommenders.map(recommender => {
    return `
      <div class="book-card" onclick="toggleExpand(this)">
        <div class="book-header">
          <div class="book-icon">👤</div>
          <div>
            <div class="book-title">${escapeHtml(recommender.name)}</div>
            <div class="book-meta">
              <span>📚 ${recommender.bookCount} book${recommender.bookCount > 1 ? 's' : ''} recommended</span>
            </div>
          </div>
        </div>
        <div class="expand-hint">Click to see their books</div>
        <div class="book-expand">
          <div class="book-list">
            ${recommender.books.map(book => {
              const status = book.status;
              const hasCode = book.code && book.code.trim();
              const hasLink = book.link && book.link.trim();
              const hasMatchedName = book.matchedBookName && book.matchedBookName !== book.bookName;
              
              // Determine display based on status
              if (status === 'completed') {
                // ✅ Completed: show code and link
                return `
                  <div class="book-item">
                    <div class="book-item-name">✅ ${escapeHtml(book.bookName)}</div>
                    ${hasMatchedName ? `<div class="book-item-matched">Matched: ${escapeHtml(book.matchedBookName)}</div>` : ''}
                    ${hasCode ? `<div class="book-item-link">🔢 Code: ${escapeHtml(book.code)}</div>` : ''}
                    ${hasLink 
                      ? `<div class="book-item-link">🔗 <a href="${escapeHtml(book.link)}" target="_blank">${escapeHtml(book.link)}</a></div>` 
                      : ''}
                  </div>
                `;
              } else if (status === 'pending') {
                // ⏳ Pending: show creating message, gray style
                return `
                  <div class="book-item book-item-pending-state">
                    <div class="book-item-name book-item-pending-name">⏳ ${escapeHtml(book.bookName)}</div>
                    <div class="book-item-pending-text">Creating code & link...</div>
                  </div>
                `;
              } else if (status === 'failed') {
                // ❌ Failed: show failed message, red style
                return `
                  <div class="book-item book-item-failed-state">
                    <div class="book-item-name book-item-failed-name">❌ ${escapeHtml(book.bookName)}</div>
                    <div class="book-item-failed-text">Creation failed</div>
                  </div>
                `;
              } else {
                // No status (legacy data): keep existing logic
                return `
                  <div class="book-item">
                    <div class="book-item-name">📚 ${escapeHtml(book.bookName)}</div>
                    ${hasCode ? `<div class="book-item-link">🔢 Code: ${escapeHtml(book.code)}</div>` : ''}
                    ${hasLink 
                      ? `<div class="book-item-link">🔗 <a href="${escapeHtml(book.link)}" target="_blank">${escapeHtml(book.link)}</a></div>` 
                      : `<div class="book-item-pending">⏳ Link pending...</div>`
                    }
                  </div>
                `;
              }
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleExpand(card) {
  card.classList.toggle('expanded');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

let refreshInterval = null;

async function loadData() {
  try {
    const response = await fetch(DATA_URL + '?t=' + Date.now());
    if (!response.ok) throw new Error('Failed to load data');
    
    allSubmissions = await response.json();
    
    // Update last updated time - US Eastern Time
    document.getElementById('lastUpdated').textContent = 
      `Last updated: ${new Date().toLocaleString('en-US', { timeZone: 'America/New_York' })}`;
    
    const aggregatedRecommenders = aggregateByRecommender(allSubmissions);
    renderBooks(aggregatedRecommenders);
    
    // Auto-refresh logic: if any submission is pending, refresh every 30s
    const hasPending = allSubmissions.some(sub => sub.status === 'pending');
    if (hasPending) {
      if (!refreshInterval) {
        refreshInterval = setInterval(loadData, 30000);
        console.log('Auto-refresh started (pending submissions detected)');
      }
    } else {
      if (refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
        console.log('Auto-refresh stopped (all submissions completed/failed)');
      }
    }
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('loadingState').innerHTML = `
      <div style="color: #ff8888;">Failed to load, please refresh</div>
    `;
  }
}

// Initial load
loadData();
</script>

</body>
</html>
